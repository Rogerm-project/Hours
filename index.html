<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Work Hours" />
  <title>Work Hours</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --accent:    #39d353;
      --red:       #f85149;
      --blue:      #58a6ff;
      --orange:    #f0883e;
      --purple:    #bc8cff;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex; flex-direction: column;
      min-height: 100vh; min-height: -webkit-fill-available;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 20px 10px;
    }
    header h1 {
      font-family: 'Space Mono', monospace; font-size: 13px;
      letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
    }
    #week-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

    #clock-card {
      margin: 10px 16px 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px 22px; text-align: center;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      display: inline-block; margin-right: 8px; vertical-align: middle; transition: background 0.3s;
    }
    #status-dot.active {
      background: var(--accent); box-shadow: 0 0 0 3px rgba(57,211,83,0.2); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(57,211,83,0.2); }
      50%      { box-shadow: 0 0 0 6px rgba(57,211,83,0.05); }
    }
    #status-label {
      font-size: 12px; color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase; font-family: 'Space Mono', monospace;
    }
    #timer {
      font-family: 'Space Mono', monospace; font-size: clamp(44px,13vw,68px);
      font-weight: 700; letter-spacing: -2px; color: var(--text);
      margin: 14px 0 4px; line-height: 1; transition: color 0.3s;
    }
    #timer.active { color: var(--accent); }
    #clock-in-time {
      font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace;
      min-height: 18px; margin-bottom: 18px;
    }
    #main-btn {
      width: 100%; padding: 15px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600;
      cursor: pointer; background: var(--accent); color: #0d1117;
      transition: transform 0.1s, opacity 0.2s, background 0.3s; letter-spacing: 0.02em;
    }
    #main-btn.clocked-in { background: var(--red); color: #fff; }
    #main-btn:active { transform: scale(0.97); opacity: 0.85; }

    #stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin: 10px 16px 0;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 10px; text-align: center;
    }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

    #action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 16px 0; }
    .action-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      padding: 11px 10px; cursor: pointer; transition: border-color 0.2s, color 0.2s; text-align: center;
    }
    .action-btn:hover { border-color: var(--blue); color: var(--blue); }
    .action-btn:active { opacity: 0.75; }

    #log-section {
      flex: 1; margin: 10px 16px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; flex-direction: column;
      overflow: hidden; min-height: 120px;
    }
    #log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #log-header span {
      font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em; font-family: 'Space Mono', monospace;
    }
    #clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, color 0.2s;
    }
    #clear-btn:hover { border-color: var(--red); color: var(--red); }
    #log-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .log-empty {
      text-align: center; color: var(--muted); font-size: 13px;
      padding: 28px 16px; line-height: 1.8;
    }
    .log-item {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 8px; padding: 9px 16px;
      border-bottom: 1px solid var(--border); animation: slideIn 0.2s ease;
    }
    .log-item:last-child { border-bottom: none; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-date { font-size: 13px; color: var(--text); }
    .log-date small {
      display: block; font-size: 11px; color: var(--muted);
      font-family: 'Space Mono', monospace; margin-top: 2px;
    }
    .log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .log-duration { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); }
    .cat-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
    }
    .cat-work1 { background: rgba(88,166,255,0.15);  color: var(--blue); }
    .cat-work2 { background: rgba(240,136,62,0.15);   color: var(--orange); }
    .cat-home  { background: rgba(188,140,255,0.15);  color: var(--purple); }
    .cat-none  { background: rgba(139,148,158,0.15);  color: var(--muted); }
    .log-delete {
      background: none; border: none; color: var(--muted); font-size: 16px;
      cursor: pointer; padding: 2px 4px; line-height: 1; border-radius: 4px;
      transition: color 0.2s; align-self: center;
    }
    .log-delete:hover { color: var(--red); }

    /* ── Sheets ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      width: 100%; max-width: 520px; animation: slideUp 0.25s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    /* Category picker */
    .cat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .cat-opt {
      padding: 10px 6px; border: 2px solid var(--border); border-radius: 10px;
      text-align: center; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--muted); transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }
    .cat-opt span { display: block; font-size: 20px; margin-bottom: 4px; }
    .cat-opt.sel-work1 { border-color: var(--blue);   color: var(--blue);   background: rgba(88,166,255,0.1); }
    .cat-opt.sel-work2 { border-color: var(--orange); color: var(--orange); background: rgba(240,136,62,0.1); }
    .cat-opt.sel-home  { border-color: var(--purple); color: var(--purple); background: rgba(188,140,255,0.1); }

    #note-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 12px; color: var(--text); font-size: 15px;
      font-family: 'DM Sans', sans-serif; resize: none; height: 72px; outline: none; margin-bottom: 12px;
    }
    #note-input:focus { border-color: var(--accent); }

    .sheet-btn {
      width: 100%; border: none; border-radius: 10px; padding: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px;
    }
    .sheet-btn-primary { background: var(--accent); color: #0d1117; }
    .sheet-btn-ghost { background: none; color: var(--muted); margin-top: 6px; padding: 10px; }

    /* Summary */
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .date-field label {
      display: block; font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 5px; font-family: 'Space Mono', monospace;
    }
    .date-field input[type="date"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px;
      font-family: 'DM Sans', sans-serif; outline: none; color-scheme: dark;
    }
    .date-field input[type="date"]:focus { border-color: var(--blue); }
    #summary-results { margin-top: 16px; }
    .summary-total {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .summary-total-label { font-size: 13px; color: var(--muted); }
    .summary-sessions { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .summary-total-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text); }
    .summary-cats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .summary-cat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    }
    .summary-cat-left { display: flex; align-items: center; gap: 10px; }
    .summary-cat-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }
    .summary-no-data { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
    .summary-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; margin: 0 0 4px; overflow: hidden; }
    .summary-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  </style>
</head>
<body>

<header>
  <h1>⏱ Work Hours</h1>
  <span id="week-label"></span>
</header>

<div id="clock-card">
  <div>
    <span id="status-dot"></span>
    <span id="status-label">Not clocked in</span>
  </div>
  <div id="timer">00:00:00</div>
  <div id="clock-in-time"></div>
  <button id="main-btn">Clock In</button>
</div>

<div id="stats-row">
  <div class="stat-card"><div class="stat-val" id="stat-today">0h 0m</div><div class="stat-lbl">Today</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-week">0h 0m</div><div class="stat-lbl">This Week</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-total">0h 0m</div><div class="stat-lbl">All Time</div></div>
</div>

<div id="action-row">
  <button class="action-btn" id="summary-btn">📊 Summary Report</button>
  <button class="action-btn" id="filter-btn">🔍 Filter Log</button>
</div>

<div id="log-section">
  <div id="log-header">
    <span id="log-title">Session Log</span>
    <button id="clear-btn">Clear All</button>
  </div>
  <div id="log-list"></div>
</div>

<!-- Clock-out sheet -->
<div class="overlay" id="note-overlay">
  <div class="sheet">
    <h3>Log this session</h3>
    <div class="cat-row">
      <div class="cat-opt" data-cat="work1"><span>💼</span>Work 1</div>
      <div class="cat-opt" data-cat="work2"><span>🔧</span>Work 2</div>
      <div class="cat-opt" data-cat="home"><span>🏠</span>Home</div>
    </div>
    <textarea id="note-input" placeholder="Add a note (optional)…"></textarea>
    <button class="sheet-btn sheet-btn-primary" id="note-save">Save Session</button>
    <button class="sheet-btn sheet-btn-ghost" id="note-skip">Skip</button>
  </div>
</div>

<!-- Summary sheet -->
<div class="overlay" id="summary-overlay">
  <div class="sheet">
    <h3>📊 Summary Report</h3>
    <div class="date-row">
      <div class="date-field"><label>From</label><input type="date" id="summary-from" /></div>
      <div class="date-field"><label>To</label><input type="date" id="summary-to" /></div>
    </div>
    <button class="sheet-btn sheet-btn-primary" id="summary-go">Generate Report</button>
    <div id="summary-results"></div>
    <button class="sheet-btn sheet-btn-ghost" id="summary-close">Close</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'wh_sessions_v2';
  const ACTIVE_KEY  = 'wh_active_v1';

  const CATS = {
    work1: { label:'Work 1', color:'var(--blue)',   cls:'cat-work1', bar:'#58a6ff' },
    work2: { label:'Work 2', color:'var(--orange)', cls:'cat-work2', bar:'#f0883e' },
    home:  { label:'Home',   color:'var(--purple)', cls:'cat-home',  bar:'#bc8cff' },
    none:  { label:'—',      color:'var(--muted)',  cls:'cat-none',  bar:'#8b949e' },
  };

  let sessions = [], activeSession = null, timerInterval = null;
  let pendingSession = null, selectedCat = null, activeFilter = null;

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
  function load() {
    try {
      const old = localStorage.getItem('wh_sessions_v1');
      if (old && !localStorage.getItem(STORAGE_KEY)) { sessions = JSON.parse(old)||[]; save(); }
      else sessions = JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
    } catch { sessions = []; }
    try { activeSession = JSON.parse(localStorage.getItem(ACTIVE_KEY)); } catch { activeSession = null; }
  }

  function fmtDuration(ms) {
    if(ms<0)ms=0;
    const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function fmtHM(ms) {
    if(ms<0)ms=0; const t=Math.floor(ms/60000); return `${Math.floor(t/60)}h ${t%60}m`;
  }
  function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  function fmtDate(ts) {
    const d=new Date(ts),t=new Date(),y=new Date(t); y.setDate(t.getDate()-1);
    if(d.toDateString()===t.toDateString()) return 'Today';
    if(d.toDateString()===y.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
  }
  function startOfWeek() { const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d.getTime(); }
  function startOfDay()  { const d=new Date();d.setHours(0,0,0,0);return d.getTime(); }
  function todayStr()     { return new Date().toISOString().slice(0,10); }
  function weekStartStr() { const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10); }

  const timerEl   = document.getElementById('timer');
  const statusDot = document.getElementById('status-dot');
  const statusLbl = document.getElementById('status-label');
  const mainBtn   = document.getElementById('main-btn');
  const ciTime    = document.getElementById('clock-in-time');
  const logList   = document.getElementById('log-list');
  const logTitle  = document.getElementById('log-title');

  function updateWeekLabel() {
    document.getElementById('week-label').textContent =
      new Date().toLocaleDateString([],{month:'short',year:'numeric'});
  }

  function updateStats() {
    const now=Date.now(), d=startOfDay(), w=startOfWeek();
    let today=0,week=0,total=0;
    for(const s of sessions){
      const dur=s.end-s.start; total+=dur;
      if(s.start>=d) today+=dur;
      if(s.start>=w) week+=dur;
    }
    if(activeSession){
      const live=now-activeSession.start; total+=live; today+=live; week+=live;
    }
    document.getElementById('stat-today').textContent=fmtHM(today);
    document.getElementById('stat-week').textContent=fmtHM(week);
    document.getElementById('stat-total').textContent=fmtHM(total);
  }

  function renderLog() {
    const list = activeFilter ? sessions.filter(s=>s.category===activeFilter) : sessions;
    logTitle.textContent = activeFilter ? `Log · ${CATS[activeFilter]?.label}` : 'Session Log';
    if(!list.length){
      logList.innerHTML=`<div class="log-empty">${sessions.length===0
        ? 'No sessions yet.<br>Tap <strong>Clock In</strong> to start.'
        : 'No sessions match this filter.'}</div>`;
      return;
    }
    logList.innerHTML=[...list].reverse().map(s=>{
      const idx=sessions.indexOf(s), dur=s.end-s.start, cat=CATS[s.category]||CATS.none;
      return `<div class="log-item">
        <div class="log-date">${fmtDate(s.start)}
          <small>${fmtTime(s.start)} – ${fmtTime(s.end)}${s.note?' · '+s.note:''}</small>
        </div>
        <div class="log-right">
          <div class="log-duration">${fmtHM(dur)}</div>
          <div class="cat-badge ${cat.cls}">${cat.label}</div>
        </div>
        <button class="log-delete" data-idx="${idx}">×</button>
      </div>`;
    }).join('');
    logList.querySelectorAll('.log-delete').forEach(btn=>
      btn.addEventListener('click',()=>{
        sessions.splice(parseInt(btn.dataset.idx),1);
        save(); renderLog(); updateStats();
      })
    );
  }

  function updateClockUI() {
    if(activeSession){
      statusDot.classList.add('active'); statusLbl.textContent='Clocked in';
      mainBtn.textContent='Clock Out'; mainBtn.classList.add('clocked-in');
      timerEl.classList.add('active'); ciTime.textContent=`Since ${fmtTime(activeSession.start)}`;
    } else {
      statusDot.classList.remove('active'); statusLbl.textContent='Not clocked in';
      mainBtn.textContent='Clock In'; mainBtn.classList.remove('clocked-in');
      timerEl.classList.remove('active'); timerEl.textContent='00:00:00'; ciTime.textContent='';
    }
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      timerEl.textContent=fmtDuration(Date.now()-activeSession.start); updateStats();
    },1000);
  }

  function clockIn() {
    activeSession={start:Date.now()};
    localStorage.setItem(ACTIVE_KEY,JSON.stringify(activeSession));
    updateClockUI(); startTimer();
  }

  function clockOut() {
    clearInterval(timerInterval);
    pendingSession={start:activeSession.start,end:Date.now(),note:'',category:null};
    activeSession=null; localStorage.removeItem(ACTIVE_KEY);
    updateClockUI(); updateStats();
    selectedCat=null;
    document.querySelectorAll('.cat-opt').forEach(o=>o.className='cat-opt');
    document.getElementById('note-input').value='';
    document.getElementById('note-overlay').classList.add('open');
  }

  function finalise(note,category) {
    pendingSession.note=note; pendingSession.category=category||null;
    sessions.push(pendingSession); pendingSession=null;
    save(); renderLog(); updateStats();
    document.getElementById('note-overlay').classList.remove('open');
  }

  mainBtn.addEventListener('click',()=>{ if(!activeSession)clockIn(); else clockOut(); });

  document.querySelectorAll('.cat-opt').forEach(opt=>
    opt.addEventListener('click',()=>{
      const cat=opt.dataset.cat;
      if(selectedCat===cat){ selectedCat=null; opt.className='cat-opt'; }
      else {
        selectedCat=cat;
        document.querySelectorAll('.cat-opt').forEach(o=>o.className='cat-opt');
        opt.classList.add(`sel-${cat}`);
      }
    })
  );

  document.getElementById('note-save').addEventListener('click',()=>
    finalise(document.getElementById('note-input').value.trim(), selectedCat));
  document.getElementById('note-skip').addEventListener('click',()=>finalise('',null));
  document.getElementById('note-overlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('note-overlay')) finalise('',null);
  });

  // Filter (cycles through categories)
  const filterSeq=[null,'work1','work2','home'];
  document.getElementById('filter-btn').addEventListener('click',()=>{
    const i=(filterSeq.indexOf(activeFilter)+1)%filterSeq.length;
    activeFilter=filterSeq[i];
    document.getElementById('filter-btn').textContent=
      activeFilter?`🔍 ${CATS[activeFilter].label}`:'🔍 Filter Log';
    renderLog();
  });

  document.getElementById('clear-btn').addEventListener('click',()=>{
    if(confirm('Delete all sessions?')){ sessions=[];save();renderLog();updateStats(); }
  });

  // Summary
  document.getElementById('summary-btn').addEventListener('click',()=>{
    document.getElementById('summary-from').value=weekStartStr();
    document.getElementById('summary-to').value=todayStr();
    document.getElementById('summary-results').innerHTML='';
    document.getElementById('summary-overlay').classList.add('open');
  });
  document.getElementById('summary-close').addEventListener('click',()=>
    document.getElementById('summary-overlay').classList.remove('open'));
  document.getElementById('summary-overlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('summary-overlay'))
      document.getElementById('summary-overlay').classList.remove('open');
  });

  document.getElementById('summary-go').addEventListener('click',()=>{
    const fv=document.getElementById('summary-from').value;
    const tv=document.getElementById('summary-to').value;
    if(!fv||!tv){alert('Please select both dates.');return;}
    const from=new Date(fv+'T00:00:00').getTime();
    const to  =new Date(tv+'T23:59:59').getTime();
    const inRange=sessions.filter(s=>s.start>=from&&s.start<=to);
    const res=document.getElementById('summary-results');
    if(!inRange.length){res.innerHTML=`<div class="summary-no-data">No sessions in this period.</div>`;return;}

    const totalMs=inRange.reduce((a,s)=>a+(s.end-s.start),0);
    const catMs={},catCt={};
    for(const s of inRange){
      const k=s.category||'none';
      catMs[k]=(catMs[k]||0)+(s.end-s.start);
      catCt[k]=(catCt[k]||0)+1;
    }

    const rows=Object.entries(catMs).sort((a,b)=>b[1]-a[1]).map(([k,ms])=>{
      const cat=CATS[k]||CATS.none, pct=Math.round(ms/totalMs*100);
      return `<div class="summary-cat-row">
        <div class="summary-cat-left">
          <div class="cat-badge ${cat.cls}">${cat.label}</div>
          <div>
            <div class="summary-cat-val" style="color:${cat.color}">${fmtHM(ms)}</div>
            <div class="summary-sessions">${catCt[k]} session${catCt[k]!==1?'s':''} · ${pct}%</div>
          </div>
        </div>
      </div>
      <div class="summary-bar-wrap">
        <div class="summary-bar-fill" style="width:${pct}%;background:${cat.bar}"></div>
      </div>`;
    }).join('');

    const fl=new Date(fv).toLocaleDateString([],{month:'short',day:'numeric'});
    const tl=new Date(tv).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
    res.innerHTML=`
      <div class="summary-total">
        <div>
          <div class="summary-total-label">${fl} – ${tl}</div>
          <div class="summary-sessions">${inRange.length} session${inRange.length!==1?'s':''}</div>
        </div>
        <div class="summary-total-val">${fmtHM(totalMs)}</div>
      </div>
      <div class="summary-cats">${rows}</div>`;
  });

  load(); updateWeekLabel(); updateClockUI(); renderLog(); updateStats();
  if(activeSession) startTimer();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
